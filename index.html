<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cashew Ticket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header" id="ticket-header" style="cursor: pointer;">
        <img src="header.png" alt="Header" class="header-img">
    </header>

    <main class="ticket-container">
        <div class="ticket-card">
            
            <div class="video-section">
                <video src="ticket_video.mp4" autoplay loop muted playsinline class="main-video"></video>
            </div>

            <div class="info-section">
                <div class="info-group">
                    <span class="label">Получатель:</span>
                    <p class="value" id="ticket-garage">Оплата проезда в автобусе, гар. номер 36749<br>
                    г. Гомель<br>
                    Филиал "Автобусный парк № 1"</p>
                </div>

                <div class="info-group">
                    <span class="label">Активен с:</span>
                    <p class="value" id="ticket-time-from">02.04.2026 16:35</p>
                </div>

                <div class="info-group">
                    <span class="label">Активен до:</span>
                    <p class="value" id="ticket-time-to">02.04.2026 17:15</p>
                </div>

                <div class="info-group">
                    <span class="label">Описание:</span>
                    <p class="value description">#ee1d1822de103193#</p>
                </div>

                <div class="info-group">
                    <span class="label">Цена:</span>
                    <p class="value description">1.05 BYN</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Cashew</p>
        <p><a href="mailto:info@cashew.me">info@cashew.me</a></p>
    </footer>

    <script>
        function updateTicket() {
            const g = localStorage.getItem('cashew_garage');
            const d = localStorage.getItem('cashew_date');

            if (g) {
                document.getElementById('ticket-garage').innerHTML = `Оплата проезда в автобусе, гар. номер ${g}<br>г. Гомель<br>Филиал "Автобусный парк № 1"`;
            }
            if (d) {
                document.getElementById('ticket-time-from').innerText = d;
                
                // Расчет +40 минут
                try {
                    let parts = d.split(' ');
                    let timeParts = parts[1].split(':');
                    let date = new Date();
                    date.setHours(parseInt(timeParts[0]));
                    date.setMinutes(parseInt(timeParts[1]) + 40);
                    
                    let newH = String(date.getHours()).padStart(2, '0');
                    let newM = String(date.getMinutes()).padStart(2, '0');
                    document.getElementById('ticket-time-to').innerText = parts[0] + " " + newH + ":" + newM;
                } catch(e) {}
            }
        }

        window.addEventListener('DOMContentLoaded', updateTicket);

        document.getElementById('ticket-header').addEventListener('click', () => {
            let resG = prompt("Гаражный номер:", localStorage.getItem('cashew_garage') || "36749");
            let resD = prompt("Время активации:", localStorage.getItem('cashew_date') || "02.04.2026 16:35");
            if (resG) localStorage.setItem('cashew_garage', resG);
            if (resD) localStorage.setItem('cashew_date', resD);
            updateTicket();
        });
    </script>
</body>
</html>
