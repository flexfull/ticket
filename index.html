<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cashew Ticket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header" id="ticket-header" style="cursor: pointer;">
        <img src="header.png" alt="Header" class="header-img">
    </header>

    <main class="ticket-container">
        <div class="ticket-card">
            
            <div class="video-section">
                <video src="ticket_video.mp4" autoplay loop muted playsinline class="main-video"></video>
            </div>

            <div class="info-section">
                <div class="info-group">
                    <span class="label">Получатель:</span>
                    <p class="value" id="ticket-garage">Оплата проезда в автобусе, гар. номер 36749<br>
                    г. Гомель<br>
                    Филиал "Автобусный парк № 1"</p>
                </div>

                <div class="info-group">
                    <span class="label">Активен с:</span>
                    <p class="value" id="ticket-time-from">02.04.2026 16:35</p>
                </div>

                <div class="info-group">
                    <span class="label">Активен до:</span>
                    <p class="value" id="ticket-time-to">02.04.2026 17:15</p>
                </div>

                <div class="info-group">
                    <span class="label">Описание:</span>
                    <p class="value description">#ee1d1822de103193#</p>
                </div>

                <div class="info-group">
                    <span class="label">Цена:</span>
                    <p class="value description">1.05 BYN</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Cashew</p>
        <p><a href="mailto:info@cashew.me">info@cashew.me</a></p>
    </footer>

    <script>
        // Скрипт для изменения данных на билете по клику на шапку
        document.getElementById('ticket-header').addEventListener('click', function() {
            let newGarage = prompt("Введите новый гаражный номер (только цифры):", "36749");
            let newDate = prompt("Введите новую дату и время (например, 02.04.2026 16:35):", "02.04.2026 16:35");

            if (newGarage) {
                document.getElementById('ticket-garage').innerHTML = `Оплата проезда в автобусе, гар. номер ${newGarage}<br>г. Гомель<br>Филиал "Автобусный парк № 1"`;
            }

            if (newDate) {
                document.getElementById('ticket-time-from').innerText = newDate;
                
                // Автоматически добавляем 40 минут для строки "Активен до"
                try {
                    let parts = newDate.split(' ');
                    if (parts.length === 2) {
                        let datePart = parts[0];
                        let timeSplit = parts[1].split(':');
                        let hours = parseInt(timeSplit[0]);
                        let mins = parseInt(timeSplit[1]);
                        
                        let d = new Date();
                        d.setHours(hours);
                        d.setMinutes(mins + 40); // +40 минут
                        
                        let newHours = String(d.getHours()).padStart(2, '0');
                        let newMins = String(d.getMinutes()).padStart(2, '0');
                        
                        document.getElementById('ticket-time-to').innerText = `${datePart} ${newHours}:${newMins}`;
                    }
                } catch (e) {
                    console.error("Ошибка при расчете времени", e);
                }
            }
        });
    </script>
</body>
</html>
